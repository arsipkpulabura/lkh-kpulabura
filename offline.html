<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Offline - Aplikasi LHK</title>
  <style>
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:Arial,sans-serif;background:#0b1220;color:#e8eefc;padding:20px}
    .card{max-width:480px;width:100%;background:#111a2b;border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:24px;text-align:center}
    h1{margin:0 0 10px;font-size:22px}p{color:#cfdaf0;line-height:1.6}button{margin-top:12px;padding:12px 16px;border:none;border-radius:12px;background:#2563eb;color:#fff;font-weight:700;cursor:pointer}
  </style>
</head>
<body>
  <div class="card">
    <h1>Kamu sedang offline</h1>
    <p>Aplikasi masih bisa dibuka, dan draft lokal tetap aman. Untuk login, export PDF/Excel, upload, dan sinkronisasi ke server, sambungkan internet lalu coba lagi.</p>
    <button onclick="location.reload()">Coba lagi</button>
  </div>
</body>
</html>
